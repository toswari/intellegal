name: ${COMPOSE_PROJECT_NAME:-legal-doc-intel}

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - go-api

  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_PING_TIMEOUT: ${DATABASE_PING_TIMEOUT:-5s}
      GO_API_PORT: ${GO_API_PORT:-8080}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_AI_BASE_URL: ${INTERNAL_AI_BASE_URL:-http://py-ai-api:8000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/samples/storage}
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT:-}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-}
    ports:
      - "${GO_API_PORT:-8080}:8080"
    volumes:
      - ./samples:/samples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      py-ai-api:
        condition: service_started

  py-ai-api:
    build:
      context: ./py-ai-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE}
      QDRANT_STARTUP_CHECK_ENABLED: ${QDRANT_STARTUP_CHECK_ENABLED}
    ports:
      - "${PY_AI_API_PORT:-8000}:8000"
    volumes:
      - ./samples:/samples
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_doc_intel}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-legal_doc_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
